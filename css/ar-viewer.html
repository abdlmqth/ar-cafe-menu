<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View in AR — Thrive Caffe</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f0f;
      color: #ffffff;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid #222;
    }

    .back-btn {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #333;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
    }

    header h2 {
      color: #c9a84c;
      font-size: 16px;
    }

    model-viewer {
      width: 100%;
      flex: 1;
      background: #0f0f0f;
    }

    .ar-launch-btn {
      background: #c9a84c;
      color: #0f0f0f;
      border: none;
      padding: 16px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      letter-spacing: 1px;
    }

    .hint {
      text-align: center;
      color: #444;
      font-size: 12px;
      padding: 10px;
      background: #0f0f0f;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="back-btn">← Back</a>
    <h2 id="dish-title">Loading...</h2>
  </header>

  <model-viewer
    id="model"
    src="models/club-sandwich.glb"
    alt="3D model of dish"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1">
  </model-viewer>

  <p class="hint">Pinch to zoom · Drag to rotate · Tap AR to place on table</p>

  <button class="ar-launch-btn" onclick="document.getElementById('model').activateAR()">
    PLACE ON TABLE — VIEW IN AR
  </button>

</body>
</html>
